<header class="header d-flex align-items-center justify-content-end">
    <div class="header-container ms-0 me-3 d-flex align-items-center justify-content-between"
        [ngClass]="{'ms-3': !showNavbar}">
        <a class="navbar-brand" [routerLink]="['/overview']">
            <img class="logo" src="/assets/logo-dark.png" alt="css-alchemy-logo">
        </a>
        <div *ngIf="showNavbar" class="nav-menu-container w-100">
            <ul class="nav-menu d-flex w-100 m-0 p-0">
                <li *ngFor="let tab of tabItems" class="nav-menu-item color-blue-white">
                    <a class="nav-link" [routerLink]="tab.routerLink" [attr.data-name]="tab.name" data-toggle="tab"
                        routerLinkActive="active">{{ tab.label }}</a>
                </li>
            </ul>
        </div>
        <div *ngIf="!showNavbar" class="ham-menu-container" (click)="toggleSideMenu()"
            [ngClass]="{'opened': showSideMenu}">
            <i *ngIf="!showSideMenu" class="bi bi-list color-blue-white ham-menu-icon-open"></i>
            <i *ngIf="showSideMenu" class="bi bi-x-lg color-blue-white ham-menu-icon-close"></i>
        </div>
    </div>
</header>

<div class="side-menu-container" [ngClass]="{'hidden': !showSideMenu}" (click)="toggleSideMenu()">
    <div *ngIf="!showNavbar" class="side-menu px-4 py-3">
        <ul class="nav-menu w-100 m-0 p-0">
            <li *ngFor="let tab of tabItems" class="nav-menu-item color-blue-white">
                <a class="nav-link" [routerLink]="tab.routerLink" [attr.data-name]="tab.name" data-toggle="tab"
                    routerLinkActive="active">{{ tab.label }}</a>
            </li>
        </ul>
    </div>
</div>
